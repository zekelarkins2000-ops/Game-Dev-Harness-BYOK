name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff import/error check
        run: ruff check --select F game_dev_harness tests

      - name: Pytest
        run: pytest -q

      - name: Verify CLI imports
        run: |
          python -m game_dev_harness.cli --help
          gdh-long --help
          gdh-package --help
